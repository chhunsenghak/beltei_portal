name: Deploy Flutter Web to Vercel

on:
  push:
    branches:
      - main # Triggers automatically when develop is merged into main

jobs:
  build:
    name: Build Flutter Web Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web App
        run: |
          flutter config --enable-web
          flutter pub get
          touch .env
          flutter build web --release

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 1

  deploy:
    name: Deploy to Vercel (Requires QA Sign-off)
    needs: build
    runs-on: ubuntu-latest
    environment: production # <--- This links to the environment rule you made in Step 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link and Deploy to Vercel
        run: |
          # 1. Pull project configuration AND production environment variables from Vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          
          # 2. Extract the variables Vercel downloaded into your required build format
          # This reads Vercel's downloaded variables and writes them to your local .env file
          if [ -f .vercel/.env.production.local ]; then
            cp .vercel/.env.production.local build/web/.env
          fi
          
          # 3. Re-create Vercel pipeline structures
          mkdir -p .vercel/output/static
          echo '{"version": 3}' > .vercel/output/config.json
          
          # 4. Copy the compiled contents along with the newly injected secure .env file
          cp -r build/web/* .vercel/output/static/
          
          # 5. Complete deployment
          vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
