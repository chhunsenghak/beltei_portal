name: Deploy Flutter Web to Vercel

on:
  push:
    branches:
      - main # Triggers automatically when develop is merged into main

jobs:
  build:
    name: Build Flutter Web Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web App
        run: |
          flutter config --enable-web
          flutter pub get
          touch .env
          flutter build web --release

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 1

  deploy:
    name: Deploy to Vercel (Requires QA Sign-off)
    needs: build
    runs-on: ubuntu-latest
    environment: production # <--- This links to the environment rule you made in Step 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link and Deploy to Vercel
        run: |
          # 1. Pull the official project settings from your dashboard
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          
          # 2. Convert and move the Flutter build into Vercel's required prebuilt structure
          mkdir -p .vercel/output/static
          cp -r build/web/* .vercel/output/static/
          
          # 3. Complete the deployment cleanly using the moved files
          vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
