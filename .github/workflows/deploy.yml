name: Deploy Flutter Web to Vercel

on:
  push:
    branches:
      - main # Triggers automatically when develop is merged into main

jobs:
  build:
    name: Build Flutter Web Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web App
        run: |
          flutter config --enable-web
          flutter pub get
          touch .env
          flutter build web --release

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/ # Grabs only the contents inside the web folder
          retention-days: 1

  deploy:
    name: Deploy to Vercel (Requires QA Sign-off)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/ # Flattens files directly into this directory path

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link and Deploy to Vercel
        run: |
          # 1. Pull the official project settings and production secrets from Vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          
          # 2. Inject Vercel dashboard environment variables back into your static asset bundle
          if [ -f .vercel/.env.production.local ]; then
            cp .vercel/.env.production.local build/web/.env
          fi
          
          # 3. Create the mandatory Vercel prebuilt framework directories
          mkdir -p .vercel/output/static
          
          # 4. Generate config.json with fallback routing (Fixes 404 errors on refresh/deep-links)
          echo '{"version": 3, "routes": [{"handle": "filesystem"}, {"src": "/.*", "dest": "/index.html"}]}' > .vercel/output/config.json
          
          # 5. Copy the actual files directly into the root static folder
          cp -r build/web/. .vercel/output/static/
          
          # 6. Push the prebuilt container live
          vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
