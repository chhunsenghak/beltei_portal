name: Deploy Flutter Web to Vercel

on:
  push:
    branches:
      - main # Triggers automatically when your develop branch merges into main

jobs:
  build:
    name: Build Flutter Web Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI to fetch environment
        run: npm install --global vercel@latest

      - name: Pull Remote Environment Configuration
        run: |
          # Downloads the secure environment variables you saved on the Vercel Web Dashboard
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web App with Injected Variables
        run: |
          flutter config --enable-web
          flutter pub get
          
          # 1. Check if the Vercel environment file even exists
          if [ ! -f .vercel/.env.production.local ]; then
            echo "❌ ERROR: Vercel environment configuration file was not found!"
            exit 1
          fi

          # 2. Extract and source variables from the Vercel environment file
          export $(cat .vercel/.env.production.local | sed 's/\r$//' | xargs)

          # 3. Fail early if required variables are empty strings
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ ERROR: Found environment file, but SUPABASE_URL or SUPABASE_ANON_KEY is missing/empty!"
            exit 1
          fi

          echo "✅ Environment variables verified. Compiling Flutter Web Application..."
          
          # 4. Build injecting the raw variables explicitly via --dart-define
          flutter build web --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 1

  deploy:
    name: Deploy to Vercel (Requires QA Sign-off)
    needs: build
    runs-on: ubuntu-latest
    environment: production # Links to your GitHub environment review gatekeeper rule
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web/ # Flattens files directly into this directory path

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link and Deploy to Vercel
        run: |
          # 1. Pull the official project settings
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          
          # 2. Create the mandatory Vercel prebuilt framework directory
          mkdir -p .vercel/output/static
          
          # 3. Generate a config file that handles clean routing (fixes 404 errors on browser refresh)
          echo '{"version": 3, "routes": [{"handle": "filesystem"}, {"src": "/.*", "dest": "/index.html"}]}' > .vercel/output/config.json
          
          # 4. Copy the raw files directly into the root static staging folder
          cp -r build/web/. .vercel/output/static/
          
          # 5. Push the prebuilt app container live instantly
          vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}